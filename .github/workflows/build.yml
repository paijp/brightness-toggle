name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'release/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # required for OIDC deploy

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0.2'

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Copy APK to release/
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/BrightnessToggle.apk

      - name: Commit and push APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release/BrightnessToggle.apk
          git diff --staged --quiet || git commit -m "build: update APK"
          git push origin main

      - name: Mint GitHub OIDC token (audience = VPS host)
        id: oidc
        env:
          VPS_HOST: k-keiei.jp
        run: |
          TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=${VPS_HOST}" | jq -r '.value')
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy APK to VPS
        env:
          TOKEN: ${{ steps.oidc.outputs.token }}
          VPS_HOST: k-keiei.jp
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X PUT --data-binary @release/BrightnessToggle.apk \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/octet-stream' \
            "https://${VPS_HOST}/deploy/apk/BrightnessToggle.apk")
          echo "HTTP $code"
          test "$code" = "200" || { echo "Deploy failed: HTTP $code"; exit 1; }
