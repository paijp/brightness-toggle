name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0.2'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Copy APK to release/
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/BrightnessToggle.apk

      - name: Commit and push APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release/BrightnessToggle.apk
          git diff --staged --quiet || git commit -m "build: update APK [skip ci]"
          git push
