plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace "com.example.brightnesstoggle"
    compileSdk 33

    defaultConfig {
        applicationId "com.example.brightnesstoggle"
        minSdk 26          // Android 8.0 (KEYoneの最終OS)
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.9.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
